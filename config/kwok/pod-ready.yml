---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-ready
spec:
  delay:
    durationMilliseconds: 1000
    durationFrom:
      expressionFrom: .metadata.annotations["pod-ready.stage.kwok.x-k8s.io/delay"]
    jitterDurationMilliseconds: 5000
    jitterDurationFrom:
      expressionFrom: .metadata.annotations["pod-ready.stage.kwok.x-k8s.io/jitter-delay"]
  next:
    patches:
      - subresource: status
        root: status
        template: |
          {{ $now := Now }}

          conditions:
          - lastTransitionTime: {{ $now | Quote }}
            status: "True"
            type: Initialized
          - lastTransitionTime: {{ $now | Quote }}
            status: "True"
            type: Ready
          - lastTransitionTime: {{ $now | Quote }}
            status: "True"
            type: ContainersReady
          {{ range .spec.readinessGates }}
          - lastTransitionTime: {{ $now | Quote }}
            status: "True"
            type: {{ .conditionType | Quote }}
          {{ end }}

          containerStatuses:
          {{ range .spec.containers }}
          - image: {{ .image | Quote }}
            name: {{ .name | Quote }}
            ready: true
            restartCount: 0
            state:
              running:
                startedAt: {{ $now | Quote }}
          {{ end }}

          initContainerStatuses:
          {{ range .spec.initContainers }}
          - image: {{ .image | Quote }}
            name: {{ .name | Quote }}
            ready: true
            restartCount: 0
            state:
              terminated:
                exitCode: 0
                finishedAt: {{ $now | Quote }}
                reason: Completed
                startedAt: {{ $now | Quote }}
          {{ end }}

          hostIP: {{ NodeIPWith .spec.nodeName | Quote }}
          podIP: {{ PodIPWith .spec.nodeName
                    ( or .spec.hostNetwork false )
                    ( or .metadata.uid "" )
                    ( or .metadata.name "" )
                    ( or .metadata.namespace "" )
                    | Quote }}
          phase: Running
          startTime: {{ $now | Quote }}
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: .metadata.deletionTimestamp
        operator: DoesNotExist
      - key: .status.phase
        operator: In
        values:
          - Pending
      - key: .status.conditions.[] | select( .type == "Initialized" ) | .status
        operator: In
        values:
          - true
      - key: .status.containerStatuses.[].state.running.startedAt
        operator: DoesNotExist
