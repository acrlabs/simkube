---
name: Publish to Quay.io and Crates.io

on:  # yamllint disable-line rule:truthy
  release:
    types: [published]

env:
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  IN_CI: "true"

permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Fetch tags
        run: git fetch --tags
      - name: Setup Builder
        uses: ./.github/actions/setup-builder
      - name: Install cargo workspaces
        run: cargo install cargo-workspaces@0.4.2 --locked
      - name: Build
        run: BUILD_MODE=release make build
      - name: Login to Quay.io
        run: >
          echo "${{ secrets.QUAY_IO_PASSWORD }}" |
          docker login quay.io -u "${{ secrets.QUAY_IO_USERNAME }}" --password-stdin
      - name: Build and push Docker image
        run: BUILD_MODE=release DOCKER_REGISTRY=quay.io/appliedcomputing make image
      - name: Logout from Quay.io
        run: docker logout quay.io
      - name: Login to crates.io
        run: echo "${{ secrets.CRATES_IO_PASSWORD }}" | cargo login
      - name: Publish to crates.io
        run: make publish
      - name: Logout from crates.io
        run: cargo logout
